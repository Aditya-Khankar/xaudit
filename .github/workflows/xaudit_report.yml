name: xaudit behavioral report
on:
  push:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install xaudit
        run: pip install -e .
      - name: Run behavioral analysis on sample trace
        run: |
          mkdir -p report
          xaudit analyze \
            --trace ./runs/sample_runs/run_anchoring.json \
            --output ./report/ \
            --no-viz
      - name: Upload Behavioral Report
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-report
          path: report/behavior_report.json
